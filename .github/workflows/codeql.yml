name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly (Mondays 04:31 UTC), so a dormant repo still gets a fresh scan.
    - cron: "31 4 * * 1"

# Read-only by default; the analyze job widens to what CodeQL needs (below).
permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Pure-Python, no compiled extensions: no build step needed.
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
