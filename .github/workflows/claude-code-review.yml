name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip bot-authored PRs (e.g. Dependabot): the review action refuses to run
    # for non-human actors, and an AI review adds no value to a mechanical
    # dependency bump. Human-authored PRs are unaffected.
    if: github.event.pull_request.user.type != 'Bot'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

            After the review finishes, make a clean review visible WITHOUT leaving a PR
            comment — a PR comment would trip the plugin's own "already reviewed"
            preflight and suppress review of later pushes (see #89). If the review posted
            NO inline findings, mark the reviewed commit with a green status:
            `gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} -f state=success -f context=claude-review/clean -f description='Claude Code review: no issues found.'`
            If you posted inline findings, do not set this status.
          # The code-review plugin only posts *inline* findings (via the action's
          # github_inline_comment MCP tool) when invoked with `--comment`, and stays
          # silent otherwise. A clean review is surfaced as a commit *status*
          # (`claude-review/clean`), not a PR comment, so it is visible without tripping
          # the plugin's own already-reviewed preflight (which halts when Claude has
          # already commented and would otherwise skip review of later pushes, #89).
          # `gh api .../statuses` is covered by Bash(gh:*) and needs `statuses: write`.
          claude_args: '--allowedTools "Task,Read,Grep,Glob,Bash(gh:*),Bash(git:*),mcp__github_inline_comment__create_inline_comment"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

