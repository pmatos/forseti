version: 2
updates:
  # Python dependencies (using uv)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    assignees:
      - "pmatos"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    assignees:
      - "pmatos"
    commit-message:
      prefix: "ci"
      include: "scope"
